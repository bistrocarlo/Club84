        }
        .invitation-card {
            max-width: 650px;

            border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #e8dcc8;
        }
        .invitation-header {
            background: linear-gradient(135deg, #5c4633, #8b7355);
            color: #f5f0e8;
            padding: 50px 30px 40px;
            text-align: center;
        }
        .invitation-header .crest {
            margin-bottom: 25px;
        }
        .invitation-header .hosts {
            font-size: 1.05rem;
            line-height: 1.6;
            margin: 25px 0 20px;
        }
        .invitation-header .request {
            font-style: italic;
            font-size: 1.08rem;
            margin: 25px 0 35px;
        }
        .invitation-header h1 {
            font-size: 3rem;
            font-weight: normal;
            letter-spacing: 4px;
            margin: 20px 0 25px;
        }
        .invitation-header .date {
            font-size: 1.45rem;
            letter-spacing: 2px;
            margin: 25px 0;
        }
        .wedding-details { 
            padding: 40px 30px; 
            text-align: center; 
            border-bottom: 1px solid #e8dcc8; 
            line-height: 1.7;
        }
        .wedding-details strong { color: #5c4633; }
        .form-body { padding: 30px; }
        .code-section { text-align: center; margin-bottom: 30px; }
        .code-section input {
            width: 100%;
            padding: 16px;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 3px;
            font-family: monospace;
            border: 1px solid #d4c4a8;
            border-radius: 4px;
            background: #fefcf8;
        }
        .form-group { margin-bottom: 22px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #5a4a35; font-size: 0.85rem; }
        input, textarea, select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d4c4a8;
            border-radius: 4px;
            font-size: 1rem;
            font-family: 'Georgia', serif;
            background: #fefcf8;
        }
        .address-row { display: grid; grid-template-columns: 1fr 2fr; gap: 15px; margin-bottom: 15px; }
        .address-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        button {
            width: 100%;
            background: #8b7355;
            color: white;
            border: none;
            padding: 16px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover { background: #6b5a45; }
        .success-message { background: #d4edda; color: #155724; padding: 20px; border-radius: 4px; text-align: center; margin-bottom: 20px; display: none; }
        .error-message { background: #f8d7da; color: #721c24; padding: 15px; border-radius: 4px; margin-bottom: 20px; display: none; }
        .info-message { background: #d1ecf1; color: #0c5460; padding: 15px; border-radius: 4px; margin-bottom: 20px; display: none; }
        .limit-warning { background: #fef8e7; color: #856404; padding: 12px; border-radius: 4px; margin-bottom: 20px; text-align: center; border-left: 4px solid #c4a882; font-style: italic; }
        .guest-names-list { margin-top: 15px; }
        .guest-name-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .guest-name-row input { flex: 1; }
        .footer { text-align: center; color: #9b8a75; font-size: 0.8rem; padding: 20px; border-top: 1px solid #e8dcc8; }
        .back-link { text-align: center; margin-top: 20px; }

        .admin-link { position: fixed; bottom: 20px; right: 20px; background: #8b7355; color: white; padding: 10px 20px; border-radius: 4px; text-decoration: none; font-size: 0.8rem; font-family: 'Georgia', serif; }
        @media (max-width: 600px) {

            .invitation-header h1 { font-size: 2.4rem; letter-spacing: 2px; }

        function generateCode(name, type) {
            let typeCode = "";
            if (type === "single") typeCode = "S";
            else if (type === "couple") typeCode = "C";
            else if (type === "family") typeCode = "F";
            else typeCode = "E";
            let prefix = name.substring(0, 2).toUpperCase().replace(/[^A-Z]/g, '');
            let random = Math.floor(Math.random() * 900) + 100;
            return typeCode + prefix + random;
        }

        function getCodeTypeInfo(type) {
            const types = {
                single: { name: "Single", max: 1, icon: "👤", desc: "seating for 1 guest" },
                couple: { name: "Couple", max: 2, icon: "💑", desc: "seating for 2 guests" },
                family: { name: "Family", max: 4, icon: "👨‍👩‍👧‍👦", desc: "seating for up to 4 guests" },
                extended: { name: "Extended", max: 6, icon: "👥", desc: "seating for up to 6 guests" }
            };
            return types[type] || types.single;
        }

        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);

        function escapeForJS(str) {
            if (!str) return "";
            return str.replace(/'/g, "\\'").replace(/"/g, '\\"');

        async function verifyCode() {
            let code = document.getElementById("inviteCode").value.trim().toUpperCase();
            let errorDiv = document.getElementById("guestErrorMsg");
            errorDiv.style.display = "none";
            
            if (!code) {
                errorDiv.innerText = "Please enter your invitation code";
                errorDiv.style.display = "block";
                return;
            }

            try {
                const q = query(collection(db, GUESTS_COLLECTION), where("code", "==", code));
                const snapshot = await getDocs(q);

                if (snapshot.empty) {
                    errorDiv.innerText = "Invalid invitation code. Please check the SMS we sent you.";
                    errorDiv.style.display = "block";
                    return;
                }

                const guestDoc = snapshot.docs[0];
                const guest = guestDoc.data();
                const guestId = guestDoc.id;

                currentMaxGuests = guest.maxGuests || 1;
                currentCodeType = guest.codeType || "single";
                const typeInfo = getCodeTypeInfo(currentCodeType);

                const rQuery = query(collection(db, RESPONSES_COLLECTION), where("guestCode", "==", code));
                const rSnapshot = await getDocs(rQuery);

                sessionStorage.setItem("guestCode", code);
                sessionStorage.setItem("guestId", guestId);
                sessionStorage.setItem("guestName", guest.name);
                sessionStorage.setItem("maxGuests", currentMaxGuests);
                sessionStorage.setItem("codeType", currentCodeType);

                document.getElementById("welcomeName").innerHTML = `Welcome ${escapeHtml(guest.name)}!<br><small>${typeInfo.icon} ${typeInfo.name} Invitation</small>`;
                document.getElementById("limitWarning").innerHTML = `✨ <strong>Your invitation includes</strong> ${typeInfo.desc}.`;

                let countSelect = document.getElementById("guestCount");
                countSelect.innerHTML = "";
                for (let i = 1; i <= currentMaxGuests; i++) {
                    let option = document.createElement("option");
                    option.value = i;
                    option.textContent = i === 1 ? "1 guest (just me)" : `${i} guests`;
                    countSelect.appendChild(option);
                }
                countSelect.onchange = () => updateGuestNameFields(parseInt(countSelect.value));

                if (!rSnapshot.empty) {
                    let existing = rSnapshot.docs[0].data();
                    document.getElementById("fullName").value = existing.fullName || "";
                    document.getElementById("unitNumber").value = existing.unitNumber || "";
                    document.getElementById("streetAddress").value = existing.streetAddress || "";
                    document.getElementById("suburb").value = existing.suburb || "";
                    document.getElementById("city").value = existing.city || "";
                    document.getElementById("state").value = existing.state || "";
                    document.getElementById("postcode").value = existing.postcode || "";
                    document.getElementById("contact").value = existing.contact || "";
                    
                    if (existing.guestCount) {
                        countSelect.value = existing.guestCount;
                        updateGuestNameFields(existing.guestCount);
                        let names = existing.guestNames || [];
                        let inputs = document.querySelectorAll(".guest-name");
                        for (let i = 0; i < names.length && i < inputs.length; i++) {
                            inputs[i].value = names[i];
                        }
                    }
                    document.getElementById("guestInfoMsg").innerText = "You have already submitted your details. You can update them below.";
                    document.getElementById("guestInfoMsg").style.display = "block";
                } else {
                    updateGuestNameFields(1);
                }

                document.getElementById("codeEntrySection").style.display = "none";
                document.getElementById("addressFormSection").style.display = "block";

            } catch (err) {
                errorDiv.innerText = "Something went wrong. Please try again.";
                errorDiv.style.display = "block";
                console.error(err);
            }
        }

        function updateGuestNameFields(count) {
            const container = document.getElementById("guestNamesList");
            container.innerHTML = "";
            for (let i = 0; i < count; i++) {
                const div = document.createElement("div");
                div.className = "guest-name-row";
                let placeholder = i === 0 ? "Your name" : `Guest ${i + 1} name`;
                div.innerHTML = `<input type="text" placeholder="${placeholder}" class="guest-name">`;
                container.appendChild(div);
            }
        }

        async function submitAddress() {
            let fullName = document.getElementById("fullName").value.trim();
            let unitNumber = document.getElementById("unitNumber").value.trim();
            let streetAddress = document.getElementById("streetAddress").value.trim();
            let suburb = document.getElementById("suburb").value.trim();
            let city = document.getElementById("city").value.trim();
            let state = document.getElementById("state").value;
            let postcode = document.getElementById("postcode").value.trim();
            let contact = document.getElementById("contact").value.trim();
            let guestCount = parseInt(document.getElementById("guestCount").value);

            let guestNames = Array.from(document.querySelectorAll(".guest-name")).map(input => input.value.trim()).filter(Boolean);

            if (guestNames.length !== guestCount) {
                alert(`Please provide names for all ${guestCount} guest(s).`);
                return;
            }

            let guestCode = sessionStorage.getItem("guestCode");
            let guestId = sessionStorage.getItem("guestId");
            let guestName = sessionStorage.getItem("guestName");

            let errorDiv = document.getElementById("guestErrorMsg");
            let successDiv = document.getElementById("guestSuccessMsg");
            errorDiv.style.display = "none";
            successDiv.style.display = "none";

            if (!fullName || !streetAddress || !postcode) {
                errorDiv.innerText = "Please fill in all required fields (Name, Street, Postcode).";
                errorDiv.style.display = "block";
                return;
            }

            try {
                const rQuery = query(collection(db, RESPONSES_COLLECTION), where("guestCode", "==", guestCode));
                const rSnapshot = await getDocs(rQuery);

                let fullAddress = [unitNumber, streetAddress, suburb, city, state, postcode].filter(Boolean).join(", ");

                let responseData = {
                    guestCode, guestId, guestName, codeType: currentCodeType, maxAllowed: currentMaxGuests,
                    fullName, unitNumber, streetAddress, suburb, city, state, postcode, fullAddress,
                    guestCount, guestNames, contact, submittedAt: new Date().toISOString()
                };

                if (!rSnapshot.empty) {
                    await updateDoc(doc(db, RESPONSES_COLLECTION, rSnapshot.docs[0].id), responseData);
                    successDiv.innerText = "Thank you! Your details have been updated.";
                } else {
                    await addDoc(collection(db, RESPONSES_COLLECTION), responseData);
                    await updateDoc(doc(db, GUESTS_COLLECTION, guestId), { replied: true, status: "replied" });
                    successDiv.innerText = "Thank you! We have received your details. We look forward to celebrating with you!";
                }
                successDiv.style.display = "block";

            } catch (err) {
                errorDiv.innerText = "Something went wrong. Please try again.";
                errorDiv.style.display = "block";
                console.error(err);
            }
        }
