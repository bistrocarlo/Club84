<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Wedding Seating Manager | Clean Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', Times, serif;
            background: #faf8f3;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #c9a84c, #e8d5a8);
            border-radius: 24px;
            padding: 25px 30px;
            margin-bottom: 25px;
            text-align: center;
            color: #2c2418;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .stats-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .stat {
            background: white;
            border-radius: 16px;
            padding: 15px 25px;
            flex: 1;
            text-align: center;
            border: 1px solid #e8dcc8;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #c9a84c;
        }

        .toolbar {
            background: white;
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 25px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            border: 1px solid #e8dcc8;
        }

        .btn {
            background: #c9a84c;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #b8953a;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #e8dcc8;
            color: #5a4a35;
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-pdf {
            background: #e74c3c;
            color: white;
        }

        .search-box {
            background: white;
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 25px;
            border: 1px solid #e8dcc8;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 40px;
            border: 1px solid #e8dcc8;
            font-size: 1rem;
            font-family: inherit;
            background: #fefcf8;
        }

        .search-input:focus {
            outline: none;
            border-color: #c9a84c;
        }

        .search-results {
            background: white;
            border-radius: 20px;
            border: 1px solid #e8dcc8;
            max-height: 350px;
            overflow-y: auto;
            margin-bottom: 25px;
            display: none;
        }

        .search-results.active {
            display: block;
        }

        .search-result-item {
            padding: 12px 18px;
            border-bottom: 1px solid #e8dcc8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .manual-guest-form {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #e8dcc8;
        }

        .form-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .form-row input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 40px;
            border: 1px solid #e8dcc8;
            font-family: inherit;
            font-size: 0.9rem;
        }

        .manual-guest-list {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .manual-guest-tag {
            background: #e8f5e9;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            border: 1px solid #a5d6a7;
            cursor: pointer;
        }

        .delete-icon {
            margin-left: 6px;
            color: #e74c3c;
            cursor: pointer;
        }

        .main-layout {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }

        .tables-area {
            flex: 2;
            min-width: 300px;
        }

        .guests-area {
            flex: 1;
            min-width: 280px;
            background: white;
            border-radius: 20px;
            border: 1px solid #e8dcc8;
            padding: 20px;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
        }

        .table-card {
            background: white;
            border-radius: 20px;
            border: 1px solid #e8dcc8;
            overflow: hidden;
        }

        .table-card.bridal {
            border: 2px solid #c9a84c;
            background: #fffcf5;
        }

        .table-header {
            background: #faf5ea;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #e8dcc8;
            font-weight: bold;
        }

        .table-guests {
            padding: 12px;
            min-height: 100px;
            max-height: 220px;
            overflow-y: auto;
        }

        .guest-chip {
            display: inline-block;
            background: #fef7e9;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin: 3px 5px 3px 0;
            border: 1px solid #e8dcc8;
            cursor: pointer;
        }

        .guest-chip.manual {
            background: #e8f5e9;
            border-color: #a5d6a7;
        }

        .guest-chip:hover {
            background: #e8dcc8;
        }

        .empty-table {
            color: #bfae8e;
            text-align: center;
            padding: 15px;
            font-style: italic;
            font-size: 0.7rem;
        }

        .guest-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #efe4d4;
        }

        .guest-name {
            font-weight: 500;
            font-size: 0.85rem;
        }

        .guest-group {
            font-size: 0.65rem;
            color: #c9a84c;
        }

        .warning {
            background: #fff3e0;
            border-radius: 16px;
            padding: 10px 15px;
            margin-bottom: 20px;
            color: #b86b2c;
            font-size: 0.8rem;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            background: white;
            padding: 20px 30px;
            border-radius: 30px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c2418;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 1001;
            animation: fadeOut 2.5s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        @media (max-width: 700px) {
            .main-layout { flex-direction: column; }
            .guests-area { position: static; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div id="app">Loading wedding seating planner from Firebase...</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAH0rBpJUh3sRpBlQgrymQM1RLBDBiAPmE",
        authDomain: "daniel-and-laura.firebaseapp.com",
        projectId: "daniel-and-laura",
        storageBucket: "daniel-and-laura.firebasestorage.app",
        messagingSenderId: "363458517473",
        appId: "1:363458517473:web:7eac683bc98623cb281aa0"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getFirestore(firebaseApp);

    const TOTAL_TABLES = 32;
    const BRIDAL_TABLE = "bridal";
    const MAX_PER_TABLE = 11;
    const MIN_PER_TABLE = 6;

    let allGuests = [];
    let manualGuests = [];
    let tableMap = new Map();
    let guestTableMap = new Map();
    let currentSearch = "";

    function showToast(msg) {
        let toast = document.querySelector('.toast');
        if (toast) toast.remove();
        toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function showLoading(show) {
        let el = document.querySelector('.loading-overlay');
        if (show && !el) {
            let div = document.createElement('div');
            div.className = 'loading-overlay';
            div.innerHTML = '<div class="spinner">⏳ Loading from Firebase...</div>';
            document.body.appendChild(div);
        } else if (!show && el) el.remove();
    }

    function initTables() {
        tableMap.clear();
        for (let i = 1; i <= TOTAL_TABLES; i++) {
            tableMap.set(i.toString(), { name: `Table ${i}`, guests: [] });
        }
        tableMap.set(BRIDAL_TABLE, { name: "👰 Bridal Table", guests: [] });
    }

    function loadManualFromStorage() {
        const saved = localStorage.getItem('wedding_manual_guests_final');
        if (saved) {
            try {
                manualGuests = JSON.parse(saved);
            } catch(e) { manualGuests = []; }
        } else {
            manualGuests = [];
        }
    }

    function saveManualToStorage() {
        localStorage.setItem('wedding_manual_guests_final', JSON.stringify(manualGuests));
    }

    function addManualGuest(firstName, lastName) {
        if (!firstName.trim()) {
            showToast("Please enter first name");
            return false;
        }
        const fullName = `${firstName.trim()} ${lastName.trim()}`.trim();
        const id = `manual_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`;
        const newGuest = {
            id: id,
            name: fullName,
            firstName: firstName.trim(),
            lastName: lastName.trim(),
            group: "Manual Entry",
            isManual: true
        };
        manualGuests.push(newGuest);
        saveManualToStorage();
        
        allGuests.push({
            id: id,
            name: fullName,
            group: "Manual Entry",
            isManual: true
        });
        
        showToast(`✓ Added ${fullName}`);
        renderApp();
        return true;
    }

    function deleteManualGuest(guestId) {
        const index = manualGuests.findIndex(g => g.id === guestId);
        if (index !== -1) manualGuests.splice(index, 1);
        saveManualToStorage();
        
        const guestIndex = allGuests.findIndex(g => g.id === guestId);
        if (guestIndex !== -1) allGuests.splice(guestIndex, 1);
        
        const tableId = guestTableMap.get(guestId);
        if (tableId) {
            const table = tableMap.get(tableId);
            if (table) {
                table.guests = table.guests.filter(g => g.id !== guestId);
            }
            guestTableMap.delete(guestId);
        }
        
        showToast("Guest removed");
        renderApp();
    }

    async function loadFirebaseGuests() {
        try {
            const guestsSnap = await getDocs(collection(db, "wedding_guests"));
            const guests = guestsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            const responsesSnap = await getDocs(collection(db, "guest_responses"));
            const responses = responsesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            const attendees = [];
            
            for (const guest of guests) {
                const response = responses.find(r => r.guestCode === guest.code);
                
                if (response && response.guestNames && response.guestNames.length > 0) {
                    for (let i = 0; i < response.guestNames.length; i++) {
                        attendees.push({
                            id: `${guest.code}_${i}`,
                            name: response.guestNames[i],
                            group: guest.name,
                            isManual: false
                        });
                    }
                } else if (response && response.fullName) {
                    attendees.push({
                        id: `${guest.code}_main`,
                        name: response.fullName,
                        group: guest.name,
                        isManual: false
                    });
                }
            }
            return attendees;
        } catch (err) {
            console.error("Firebase error:", err);
            return [];
        }
    }

    async function loadSeatingFromFirebase() {
        const pathsToTry = [
            { collection: "wedding_seating", docId: "master" },
            { collection: "table_assignments", docId: "master_seating" },
            { collection: "seating_plan", docId: "current" }
        ];
        
        for (const path of pathsToTry) {
            try {
                const seatingDoc = await getDoc(doc(db, path.collection, path.docId));
                if (seatingDoc.exists()) {
                    const data = seatingDoc.data();
                    let rawMap = null;
                    if (data.tableMap) rawMap = data.tableMap;
                    else if (data.tableAssignments) rawMap = data.tableAssignments;
                    else if (data.tables) rawMap = data.tables;
                    
                    if (rawMap) {
                        const loadedMap = new Map();
                        for (const [tid, tableData] of Object.entries(rawMap)) {
                            loadedMap.set(tid, { 
                                name: tableData.name || (tid === BRIDAL_TABLE ? "👰 Bridal Table" : `Table ${tid}`),
                                guests: tableData.guests || [] 
                            });
                        }
                        
                        guestTableMap.clear();
                        for (const [tid, table] of loadedMap.entries()) {
                            if (table.guests) {
                                for (const g of table.guests) {
                                    if (g && g.id) guestTableMap.set(g.id, tid);
                                }
                            }
                        }
                        return loadedMap;
                    }
                }
            } catch (err) {
                // Silent fail
            }
        }
        return null;
    }

    async function saveSeatingToFirebase() {
        showLoading(true);
        try {
            const exportMap = {};
            for (const [key, val] of tableMap.entries()) {
                exportMap[key] = { name: val.name, guests: val.guests };
            }
            await setDoc(doc(db, "wedding_seating", "master"), {
                tableMap: exportMap,
                updatedAt: new Date().toISOString(),
                totalGuests: allGuests.length,
                seatedCount: Array.from(tableMap.values()).reduce((sum, t) => sum + t.guests.length, 0)
            });
            showToast("✓ Seating saved to Firebase!");
        } catch (err) {
            alert("Save failed: " + err.message);
        } finally {
            showLoading(false);
        }
    }

    function assignGuestToTable(guest, tableId) {
        const table = tableMap.get(tableId);
        if (!table) return false;
        
        if (tableId !== BRIDAL_TABLE && table.guests.length >= MAX_PER_TABLE) {
            showToast(`Table is full (max ${MAX_PER_TABLE} guests)`);
            return false;
        }
        
        const oldTableId = guestTableMap.get(guest.id);
        if (oldTableId) {
            const oldTable = tableMap.get(oldTableId);
            if (oldTable) {
                oldTable.guests = oldTable.guests.filter(g => g.id !== guest.id);
            }
        }
        
        table.guests.push({ ...guest });
        guestTableMap.set(guest.id, tableId);
        renderApp();
        return true;
    }

    function removeGuestFromTable(guestId, tableId) {
        const table = tableMap.get(tableId);
        if (table) {
            table.guests = table.guests.filter(g => g.id !== guestId);
            guestTableMap.delete(guestId);
            renderApp();
        }
    }

    function resetAllSeating() {
        if (confirm("⚠️ Reset all seating? This will clear all table assignments.")) {
            initTables();
            guestTableMap.clear();
            renderApp();
            showToast("Seating reset");
        }
    }

    function getUnassignedGuests() {
        return allGuests.filter(g => !guestTableMap.has(g.id));
    }

    function getTableWarnings() {
        const warnings = [];
        for (const [tid, table] of tableMap.entries()) {
            if (tid === BRIDAL_TABLE) continue;
            const count = table.guests.length;
            if (count > 0 && count < MIN_PER_TABLE) {
                warnings.push(`${table.name} has ${count} guests (min ${MIN_PER_TABLE})`);
            }
        }
        return warnings;
    }

    function searchGuests(term) {
        if (!term.trim()) return [];
        const lower = term.toLowerCase();
        return allGuests.filter(g => 
            g.name.toLowerCase().includes(lower) || 
            g.group.toLowerCase().includes(lower)
        );
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    async function exportToPDF() {
        showLoading(true);
        
        const pdfContent = document.createElement('div');
        pdfContent.style.cssText = 'font-family: Georgia, Times New Roman, Times, serif; padding: 40px; background: white;';
        
        let totalSeated = 0;
        for (const table of tableMap.values()) totalSeated += table.guests.length;
        
        pdfContent.innerHTML = `
            <div style="text-align:center; margin-bottom:30px; border-bottom:2px solid #c9a84c; padding-bottom:20px;">
                <h1 style="font-size:28px; color:#2c2418;">Daniel & Laura · Wedding Seating Plan</h1>
                <p style="color:#8b7355;">Generated on ${new Date().toLocaleDateString()} at ${new Date().toLocaleTimeString()}</p>
            </div>
            <div style="display:flex; justify-content:space-around; margin-bottom:30px; flex-wrap:wrap;">
                <div style="text-align:center; padding:10px 20px; background:#faf5ea; border-radius:12px;"><div style="font-size:24px; font-weight:bold; color:#c9a84c;">${allGuests.length}</div><div>Total Guests</div></div>
                <div style="text-align:center; padding:10px 20px; background:#faf5ea; border-radius:12px;"><div style="font-size:24px; font-weight:bold; color:#c9a84c;">${totalSeated}</div><div>Seated</div></div>
                <div style="text-align:center; padding:10px 20px; background:#faf5ea; border-radius:12px;"><div style="font-size:24px; font-weight:bold; color:#c9a84c;">${getUnassignedGuests().length}</div><div>Unassigned</div></div>
            </div>
            <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:20px;">
                ${Array.from(tableMap.entries()).sort((a,b) => {
                    if (a[0] === BRIDAL_TABLE) return 1;
                    if (b[0] === BRIDAL_TABLE) return -1;
                    return parseInt(a[0]) - parseInt(b[0]);
                }).map(([tid, table]) => `
                    <div style="border:1px solid #e8dcc8; border-radius:12px; overflow:hidden; page-break-inside:avoid;">
                        <div style="background:#faf5ea; padding:10px 12px; font-weight:bold; border-bottom:1px solid #e8dcc8;">${table.name} ${tid === BRIDAL_TABLE ? '⭐' : ''} (${table.guests.length} guests)</div>
                        <div style="padding:10px 12px; min-height:80px;">
                            ${table.guests.length === 0 ? '<em>No guests assigned</em>' : 
                                table.guests.map(g => `<div style="font-size:11px; padding:4px 0; border-bottom:1px dotted #f0e6d8;">• ${escapeHtml(g.name)} ${g.isManual ? '(Manual)' : ''}</div>`).join('')
                            }
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
        
        document.body.appendChild(pdfContent);
        
        const opt = {
            margin: [0.5, 0.5, 0.5, 0.5],
            filename: `wedding_seating_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
        };
        
        try {
            await html2pdf().set(opt).from(pdfContent).save();
            showToast("PDF exported successfully!");
        } catch (err) {
            alert("PDF export failed: " + err.message);
        } finally {
            pdfContent.remove();
            showLoading(false);
        }
    }

    async function renderApp() {
        const app = document.getElementById('app');
        const unassigned = getUnassignedGuests();
        const warnings = getTableWarnings();
        const searchResults = currentSearch ? searchGuests(currentSearch) : [];
        
        let totalSeated = 0;
        for (const table of tableMap.values()) totalSeated += table.guests.length;
        
        const allTableOptions = Array.from({ length: TOTAL_TABLES }, (_, i) => i + 1);
        
        app.innerHTML = `
            <div class="container">
                <div class="header">
                    <h1>✨ Daniel & Laura · Wedding Seating ✨</h1>
                    <p>${TOTAL_TABLES} guest tables (${MIN_PER_TABLE}-${MAX_PER_TABLE} seats) + Bridal Table</p>
                </div>
                
                <div class="stats-bar">
                    <div class="stat"><div class="stat-number">${allGuests.length}</div><div>Total Guests</div></div>
                    <div class="stat"><div class="stat-number">${totalSeated}</div><div>Seated</div></div>
                    <div class="stat"><div class="stat-number">${unassigned.length}</div><div>Unassigned</div></div>
                    <div class="stat"><div class="stat-number">${TOTAL_TABLES}</div><div>Tables</div></div>
                </div>
                
                ${warnings.length ? `<div class="warning">⚠️ ${warnings.join(' · ')}</div>` : ''}
                
                <div class="toolbar">
                    <button class="btn" id="saveBtn">💾 Save to Firebase</button>
                    <button class="btn btn-secondary" id="resetBtn">⟳ Reset All</button>
                    <button class="btn btn-pdf" id="pdfBtn">📄 Export PDF</button>
                </div>
                
                <div class="manual-guest-form">
                    <div class="form-row">
                        <input type="text" id="firstName" placeholder="First name" autocomplete="off">
                        <input type="text" id="lastName" placeholder="Last name" autocomplete="off">
                        <button class="btn btn-success" id="addManualBtn">+ Add Manual Guest</button>
                    </div>
                    <div class="manual-guest-list">
                        ${manualGuests.map(g => `
                            <span class="manual-guest-tag" data-id="${g.id}">
                                ${escapeHtml(g.name)} 
                                <span class="delete-icon" data-id="${g.id}">✖</span>
                            </span>
                        `).join('')}
                        ${manualGuests.length === 0 ? '<span style="font-size:0.7rem; color:#bfae8e;">No manual guests added yet</span>' : ''}
                    </div>
                </div>
                
                <div class="search-box">
                    <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search guest by name..." value="${escapeHtml(currentSearch)}" autocomplete="off">
                    <button class="btn" id="searchBtn">Search</button>
                    <button class="btn btn-secondary" id="clearSearchBtn">Clear</button>
                </div>
                
                <div id="searchResults" class="search-results ${searchResults.length > 0 ? 'active' : ''}">
                    ${searchResults.map(guest => `
                        <div class="search-result-item">
                            <div><strong>${escapeHtml(guest.name)}</strong> <small>(${escapeHtml(guest.group)})</small> ${guest.isManual ? '📝' : ''} ${guestTableMap.has(guest.id) ? '✓ Seated' : ''}</div>
                            <div>
                                <select class="assign-select" data-id="${guest.id}" style="width:120px;">
                                    <option value="">→ Table</option>
                                    ${allTableOptions.map(t => `<option value="${t}">Table ${t}</option>`).join('')}
                                    <option value="${BRIDAL_TABLE}">👰 Bridal</option>
                                </select>
                                <button class="btn" style="padding:6px 12px;" data-assign="${guest.id}">Assign</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="main-layout">
                    <div class="tables-area">
                        <div class="tables-grid" id="tablesGrid"></div>
                    </div>
                    <div class="guests-area">
                        <h3>📋 Unassigned Guests (${unassigned.length})</h3>
                        <div id="unassignedList"></div>
                    </div>
                </div>
            </div>
        `;
        
        // Render tables
        const grid = document.getElementById('tablesGrid');
        if (grid) {
            grid.innerHTML = '';
            const sorted = Array.from(tableMap.keys()).sort((a,b) => {
                if (a === BRIDAL_TABLE) return 1;
                if (b === BRIDAL_TABLE) return -1;
                return parseInt(a) - parseInt(b);
            });
            
            for (const tid of sorted) {
                const table = tableMap.get(tid);
                const isBridal = tid === BRIDAL_TABLE;
                const card = document.createElement('div');
                card.className = `table-card ${isBridal ? 'bridal' : ''}`;
                card.innerHTML = `
                    <div class="table-header">
                        <span>${table.name} ${isBridal ? '⭐' : ''}</span>
                        <span>${table.guests.length} ${!isBridal ? `/ ${MAX_PER_TABLE}` : 'guests'}</span>
                    </div>
                    <div class="table-guests">
                        ${table.guests.length === 0 ? '<div class="empty-table">— empty —</div>' : 
                            table.guests.map(g => `<span class="guest-chip ${g.isManual ? 'manual' : ''}" data-id="${g.id}" data-table="${tid}">${escapeHtml(g.name)} ${g.isManual ? '📝' : ''} ✖</span>`).join('')
                        }
                    </div>
                `;
                grid.appendChild(card);
                
                card.querySelectorAll('.guest-chip').forEach(chip => {
                    chip.onclick = () => {
                        const id = chip.dataset.id;
                        const tid = chip.dataset.table;
                        if (confirm('Remove this guest?')) removeGuestFromTable(id, tid);
                    };
                });
            }
        }
        
        // Render unassigned
        const unassignedDiv = document.getElementById('unassignedList');
        if (unassignedDiv) {
            if (unassigned.length === 0) {
                unassignedDiv.innerHTML = '<div style="text-align:center; padding:30px; color:#bfae8e;">✨ All guests assigned! ✨</div>';
            } else {
                unassignedDiv.innerHTML = unassigned.map(g => `
                    <div class="guest-list-item">
                        <div><div class="guest-name">${escapeHtml(g.name)} ${g.isManual ? '📝' : ''}</div><div class="guest-group">${escapeHtml(g.group)}</div></div>
                        <select id="quick_${g.id.replace(/[^a-zA-Z0-9]/g, '_')}" style="width:100px;">
                            <option value="">Table</option>
                            ${allTableOptions.map(t => `<option value="${t}">${t}</option>`).join('')}
                            <option value="${BRIDAL_TABLE}">👰</option>
                        </select>
                        <button class="btn" style="padding:4px 10px;" data-quick="${g.id}">✔</button>
                    </div>
                `).join('');
                
                for (const g of unassigned) {
                    const btn = unassignedDiv.querySelector(`[data-quick="${g.id}"]`);
                    const sel = unassignedDiv.querySelector(`#quick_${g.id.replace(/[^a-zA-Z0-9]/g, '_')}`);
                    if (btn && sel) btn.onclick = () => { if (sel.value) assignGuestToTable(g, sel.value); else showToast('Select a table'); };
                }
            }
        }
        
        // Event listeners
        document.getElementById('saveBtn').onclick = saveSeatingToFirebase;
        document.getElementById('resetBtn').onclick = resetAllSeating;
        document.getElementById('pdfBtn').onclick = exportToPDF;
        document.getElementById('addManualBtn').onclick = () => {
            const first = document.getElementById('firstName').value;
            const last = document.getElementById('lastName').value;
            if (addManualGuest(first, last)) {
                document.getElementById('firstName').value = '';
                document.getElementById('lastName').value = '';
            }
        };
        
        document.querySelectorAll('.delete-icon').forEach(el => {
            el.onclick = (e) => {
                e.stopPropagation();
                if (confirm('Delete this manual guest?')) deleteManualGuest(el.dataset.id);
            };
        });
        
        const searchInput = document.getElementById('searchInput');
        document.getElementById('searchBtn').onclick = () => { currentSearch = searchInput.value; renderApp(); };
        document.getElementById('clearSearchBtn').onclick = () => { currentSearch = ''; searchInput.value = ''; renderApp(); };
        if (searchInput) searchInput.onkeypress = (e) => { if (e.key === 'Enter') { currentSearch = searchInput.value; renderApp(); } };
        
        document.querySelectorAll('[data-assign]').forEach(btn => {
            btn.onclick = () => {
                const guestId = btn.dataset.assign;
                const select = document.querySelector(`.assign-select[data-id="${guestId}"]`);
                if (select && select.value) {
                    const guest = allGuests.find(g => g.id === guestId);
                    if (guest) assignGuestToTable(guest, select.value);
                } else showToast('Select a table');
            };
        });
    }
    
    async function init() {
        showLoading(true);
        
        const firebaseGuests = await loadFirebaseGuests();
        loadManualFromStorage();
        
        allGuests = [...firebaseGuests];
        for (const m of manualGuests) {
            allGuests.push({ id: m.id, name: m.name, group: "Manual Entry", isManual: true });
        }
        
        const savedSeating = await loadSeatingFromFirebase();
        if (savedSeating && savedSeating.size > 0) {
            tableMap = savedSeating;
        } else {
            initTables();
        }
        
        showLoading(false);
        renderApp();
        showToast("Ready!");
    }
    
    init();
</script>
</body>
</html>
