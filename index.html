        function generateCode(name, type) {
            let typeCode = "";
            if (type === "single") typeCode = "S";
            else if (type === "couple") typeCode = "C";
            else if (type === "family") typeCode = "F";
            else typeCode = "E";

            let random = Math.floor(Math.random() * 900) + 100;
            return typeCode + prefix + random;

            return types[type] || types.single;

        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function(m) {
                if (m === "&") return "&amp;";
                if (m === "<") return "&lt;";
                if (m === ">") return "&gt;";
                return m;
            });

        function formatAustralianAddress(unit, street, suburb, city, state, postcode) {
            let parts = [];
            if (unit && street) parts.push(`${unit} ${street}`);
            else if (street) parts.push(street);
            if (suburb) parts.push(suburb);
            if (city && city !== suburb) parts.push(city);
            let statePostcode = "";
            if (state && postcode) statePostcode = `${state} ${postcode}`;
            else if (state) statePostcode = state;
            else if (postcode) statePostcode = postcode;
            if (statePostcode) parts.push(statePostcode);
            return parts.join(", ");
        }

                sessionStorage.setItem("guestId", guestId);
                sessionStorage.setItem("guestName", guest.name);
                sessionStorage.setItem("maxGuests", currentMaxGuests);
                sessionStorage.setItem("codeType", currentCodeType);

                document.getElementById("welcomeName").innerHTML = `Welcome ${escapeHtml(guest.name)}!<br><small>${typeInfo.icon} ${typeInfo.name} Invitation</small>`;
                document.getElementById("limitWarning").innerHTML = `✨ <strong>Your invitation includes</strong> ${typeInfo.desc}. Please let us know the names of everyone attending below.`;
                
                let countSelect = document.getElementById("guestCount");
                countSelect.innerHTML = "";
                for (let i = 1; i <= currentMaxGuests; i++) {
                    let option = document.createElement("option");
                    option.value = i;
                    option.textContent = i === 1 ? "1 guest (just me)" : `${i} guests`;
                    countSelect.appendChild(option);
                }
                
                countSelect.onchange = function() {
                    updateGuestNameFields(parseInt(this.value));
                };
                
                if (!rSnapshot.empty) {
                    let existing = rSnapshot.docs[0].data();
                    document.getElementById("fullName").value = existing.fullName || "";
                    document.getElementById("unitNumber").value = existing.unitNumber || "";
                    document.getElementById("streetAddress").value = existing.streetAddress || "";
                    document.getElementById("suburb").value = existing.suburb || "";
                    document.getElementById("city").value = existing.city || "";
                    document.getElementById("state").value = existing.state || "";
                    document.getElementById("postcode").value = existing.postcode || "";
                    document.getElementById("contact").value = existing.contact || "";
                    
                    if (existing.guestCount) {
                        countSelect.value = existing.guestCount;
                        updateGuestNameFields(existing.guestCount);
                        let names = existing.guestNames || [];
                        let nameInputs = document.querySelectorAll(".guest-name");
                        for (let i = 0; i < names.length && i < nameInputs.length; i++) {
                            nameInputs[i].value = names[i];
                        }
                    }
                    
                    let infoDiv = document.getElementById("guestInfoMsg");
                    infoDiv.innerText = "You have already submitted your details. You can update them below.";
                    infoDiv.style.display = "block";
                } else {
                    updateGuestNameFields(1);
                }

                document.getElementById("codeEntrySection").style.display = "none";
                document.getElementById("addressFormSection").style.display = "block";

            } catch (err) {
                errorDiv.innerText = "Something went wrong. Please try again.";
                errorDiv.style.display = "block";
                console.error(err);
            } finally {
                showLoading(false);
            }
        }

        function updateGuestNameFields(count) {
            const container = document.getElementById("guestNamesList");
            container.innerHTML = "";
            
            for (let i = 0; i < count; i++) {
                const div = document.createElement("div");
                div.className = "guest-name-row";
                let placeholder = i === 0 ? "Your name" : `Guest ${i + 1} name`;
                div.innerHTML = `<input type="text" placeholder="${placeholder}" class="guest-name">`;
                container.appendChild(div);
            }
        }

        async function submitAddress() {
            let fullName = document.getElementById("fullName").value.trim();
            let unitNumber = document.getElementById("unitNumber").value.trim();
            let streetAddress = document.getElementById("streetAddress").value.trim();
            let suburb = document.getElementById("suburb").value.trim();
            let city = document.getElementById("city").value.trim();
            let state = document.getElementById("state").value;
            let postcode = document.getElementById("postcode").value.trim();
            let contact = document.getElementById("contact").value.trim();
            let guestCount = parseInt(document.getElementById("guestCount").value);
            
            let guestCode = sessionStorage.getItem("guestCode");
            
            // Rate limiting check
            let lastSubmit = submissionTracker.get(guestCode);
            if (lastSubmit && (Date.now() - lastSubmit) < 30000) {
                let errorDiv = document.getElementById("guestErrorMsg");
                errorDiv.innerText = "Please wait 30 seconds before submitting again.";
                errorDiv.style.display = "block";
                return;
            }
            
            let fullAddress = formatAustralianAddress(unitNumber, streetAddress, suburb, city, state, postcode);
            
            let guestNames = [];
            let nameInputs = document.querySelectorAll(".guest-name");
            for (let i = 0; i < nameInputs.length; i++) {
                let guestName = nameInputs[i].value.trim();
                if (guestName) guestNames.push(guestName);
            }
            
            if (guestNames.length !== guestCount) {
                alert(`Please provide names for all ${guestCount} guest(s).`);
                return;
            }
            
            let guestId = sessionStorage.getItem("guestId");
            let guestName = sessionStorage.getItem("guestName");
            
            let errorDiv = document.getElementById("guestErrorMsg");
            let successDiv = document.getElementById("guestSuccessMsg");
            errorDiv.style.display = "none";
            successDiv.style.display = "none";

            if (!fullName) {
                errorDiv.innerText = "Please enter your name";
                errorDiv.style.display = "block";
                return;
            }
            if (!streetAddress) {
                errorDiv.innerText = "Please enter your street address";
                errorDiv.style.display = "block";
                return;
            }
            if (!postcode) {
                errorDiv.innerText = "Please enter your postcode";
                errorDiv.style.display = "block";
                return;
            }

            showLoading(true, "Saving your details...");
            try {
                const rQuery = query(collection(db, RESPONSES_COLLECTION), where("guestCode", "==", guestCode));
                const rSnapshot = await getDocs(rQuery);

                let responseData = {
                    guestCode: guestCode,
                    guestId: guestId,
                    guestName: guestName,
                    codeType: currentCodeType,
                    maxAllowed: currentMaxGuests,
                    fullName: fullName,
                    unitNumber: unitNumber,
                    streetAddress: streetAddress,
                    suburb: suburb,
                    city: city,
                    state: state,
                    postcode: postcode,
                    fullAddress: fullAddress,
                    guestCount: guestCount,
                    guestNames: guestNames,
                    contact: contact,
                    submittedAt: new Date().toISOString()
                };

                if (!rSnapshot.empty) {
                    await updateDoc(doc(db, RESPONSES_COLLECTION, rSnapshot.docs[0].id), responseData);
                    successDiv.innerText = "Thank you! Your details have been updated. Your formal invitation will be mailed to you soon.";
                } else {
                    await addDoc(collection(db, RESPONSES_COLLECTION), responseData);
                    await updateDoc(doc(db, GUESTS_COLLECTION, guestId), { replied: true, status: "replied" });
                    successDiv.innerText = "Thank you! We have received your details. Your formal invitation will be mailed to you soon. We look forward to celebrating with you!";
                }
                successDiv.style.display = "block";
                submissionTracker.set(guestCode, Date.now());

            } catch (err) {
                errorDiv.innerText = "Something went wrong. Please try again.";
                errorDiv.style.display = "block";
                console.error(err);
            } finally {
                showLoading(false);
            }
        }

        // Admin Dashboard
        function renderAdminLogin() {
            document.getElementById("app").innerHTML = `
                <div class="login-box">
                    <h2>Admin Login</h2>
                    <input type="password" id="adminPassword" placeholder="Enter admin password">
                    <button id="loginBtn">Login</button>
                </div>
                <a href="?admin=false" class="admin-link">Back to Guest Page</a>
            `;
            document.getElementById("loginBtn").onclick = function() {
                if (document.getElementById("adminPassword").value === ADMIN_PASSWORD) {
                    sessionStorage.setItem("adminLoggedIn", "true");
                    renderAdminDashboard();
                } else { alert("Wrong password"); }
            };
        }

        async function loadAdminData() {
            showLoading(true, "Loading guest data...");
            try {
                const guestsSnap = await getDocs(collection(db, GUESTS_COLLECTION));
                allGuests = guestsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                const responsesSnap = await getDocs(collection(db, RESPONSES_COLLECTION));
                allResponses = responsesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                for (let guest of allGuests) {
                    guest.responseStatus = allResponses.some(r => r.guestCode === guest.code) ? "replied" : (guest.smsSent ? "sent" : "pending");
                }
                renderAdminTables();
                updateAdminStats();
            } finally {
                showLoading(false);
            }
        }

        function renderAdminTables() {
            let tbody = document.getElementById("guestTableBody");
            let html = "";
            for (let guest of allGuests) {
                let typeInfo = getCodeTypeInfo(guest.codeType);
                let statusClass = guest.responseStatus === "replied" ? "status-replied" : (guest.responseStatus === "sent" ? "status-sent" : "status-pending");
                let statusText = guest.responseStatus === "replied" ? "Address Received" : (guest.responseStatus === "sent" ? "SMS Sent" : "Pending");
                html += `<tr>
                    <td><code>${escapeHtml(guest.code)}</code> <span class="code-type-badge code-${guest.codeType}">${typeInfo.icon} ${typeInfo.name}</span></td>
                    <td><strong>${escapeHtml(guest.name)}</strong> (${typeInfo.desc})</td>
                    <td>${guest.phone || '<span style="color:#999;">Not set</span>'}</td>
                    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    <td><button class="btn-sm btn-blue" onclick="openEdit('${guest.id}')">Edit</button>
                        <button class="btn-sm btn-green" onclick="openSms('${guest.code}', '${escapeForJS(guest.name)}', '${escapeForJS(guest.phone || "")}')">SMS</button>
                    </td>
                </tr>`;
            }
            tbody.innerHTML = html;
            
            let repliesBody = document.getElementById("repliesTableBody");
            let repliesHtml = "";
            for (let r of allResponses) {
                repliesHtml += `<tr>
                    <td><code>${escapeHtml(r.guestCode)}</code></td>
                    <td>${escapeHtml(r.guestName)}</td>
                    <td><strong>${escapeHtml(r.fullName || "")}</strong></td>
                    <td style="max-width:250px;">${escapeHtml(r.fullAddress || "")}</td>
                    <td>${r.guestCount || 1} guests</td>
                </tr>`;
            }
            repliesBody.innerHTML = repliesHtml || '<tr><td colspan="5">No responses yet</td></tr>';
        }

        function updateAdminStats() {
            let total = allGuests.length;
            let sent = allGuests.filter(g => g.smsSent).length;
            let replied = allResponses.length;
            document.getElementById("statsContainer").innerHTML = `
                <div class="stat-card"><div class="stat-number">${total}</div><div>Total Invited</div></div>
                <div class="stat-card"><div class="stat-number">${sent}</div><div>SMS Sent</div></div>
                <div class="stat-card"><div class="stat-number">${replied}</div><div>Addresses Received</div></div>
                <div class="stat-card"><div class="stat-number">${total - replied}</div><div>Awaiting Reply</div></div>
            `;
        }

        window.openEdit = function(id) {
            currentEditGuestId = id;
            let guest = allGuests.find(g => g.id === id);
            document.getElementById("editGuestName").value = guest.name;
            document.getElementById("editGuestPhone").value = guest.phone || "";
            document.getElementById("editCodeType").value = guest.codeType;
            document.getElementById("editMaxGuests").value = guest.maxGuests;
            document.getElementById("editModal").style.display = "flex";
        };

        window.openSms = function(code, name, phone) {
            if (!phone) { alert("Please add a mobile number first. Click Edit to add."); return; }
            let appUrl = window.location.origin;
            let guest = allGuests.find(g => g.code === code);
            let typeInfo = getCodeTypeInfo(guest?.codeType || "single");
            let msg = `Dear ${name.split(' ')[0]},\n\nWe are hoping to celebrate our wedding with you on Saturday, 3rd October 2026 at St Monica's Catholic Church, Moonee Ponds.\n\nBefore we send the formal invitation by mail, could you please confirm your postal address?\n\nPlease visit: ${appUrl}\nEnter your code: ${code}\n\nYour invitation includes ${typeInfo.desc}. We would be truly honoured to have you there.\n\nWarmly,\nDaniel & Laura`;
            document.getElementById("smsGuestName").innerText = name;
            document.getElementById("smsPhone").innerText = phone;
            document.getElementById("smsMessage").value = msg;
            document.getElementById("smsModal").style.display = "flex";
            if (guest && !guest.smsSent) {
                updateDoc(doc(db, GUESTS_COLLECTION, guest.id), { smsSent: true, status: "sent" });
                setTimeout(loadAdminData, 500);
            }
        };

        function renderAdminDashboard() {
            document.getElementById("app").innerHTML = `
                <div class="admin-container">
                    <div class="admin-header"><h1>Admin Dashboard</h1><p>Manage Guests with Guest Limits</p></div>
                    <div class="stats" id="statsContainer"></div>
                    <div class="tabs"><button class="tab-btn active" data-tab="guests">Guest List</button><button class="tab-btn" data-tab="replies">Responses</button></div>
                    <div id="guests" class="tab-content active">
                        <div class="filter-bar"><input type="text" id="searchGuest" placeholder="Search..."><select id="filterStatus"><option value="all">All</option><option value="pending">Pending</option><option value="sent">SMS Sent</option><option value="replied">Replied</option></select><button id="refreshBtn" class="btn-sm btn-blue">Refresh</button></div>
                        <div class="add-guest-form"><input type="text" id="newGuestName" placeholder="Guest name"><select id="newCodeType"><option value="single">Single (1 guest)</option><option value="couple">Couple (2 guests)</option><option value="family">Family (4 guests)</option><option value="extended">Extended (6 guests)</option></select><input type="tel" id="newGuestPhone" placeholder="Mobile"><button id="addGuestBtn" class="btn-sm btn-green">Add</button></div>
                        <div class="guest-table-container"><table><thead><tr><th>Code</th><th>Guest</th><th>Mobile</th><th>Status</th><th>Actions</th></tr></thead><tbody id="guestTableBody"></tbody></table></div>
                    </div>
                    <div id="replies" class="tab-content"><div class="guest-table-container"><table><thead><tr><th>Code</th><th>Guest Name</th><th>Verified Name</th><th>Address</th><th>Guests</th></tr></thead><tbody id="repliesTableBody"></tbody></table><button id="exportCsvBtn" class="btn-sm btn-green" style="margin-top:15px;">Export CSV</button></div></div>
                </div>
                <div id="editModal" class="modal"><div class="edit-modal-content"><h3>Edit Guest</h3><label>Name:</label><input type="text" id="editGuestName"><label>Phone:</label><input type="tel" id="editGuestPhone"><label>Code Type:</label><select id="editCodeType"><option value="single">Single (1 guest)</option><option value="couple">Couple (2 guests)</option><option value="family">Family (4 guests)</option><option value="extended">Extended (6 guests)</option></select><label>Max Guests:</label><input type="number" id="editMaxGuests" min="1" max="10"><div class="action-buttons"><button id="saveEditBtn" class="btn-sm btn-green">Save</button><button id="closeEditModal" class="btn-sm btn-red">Cancel</button></div><hr><button id="deleteGuestBtn" class="btn-sm btn-red">Delete Guest</button></div></div>
                <div id="smsModal" class="modal"><div class="modal-content"><h3>SMS to Guest</h3><p><strong id="smsGuestName"></strong></p><p>Mobile: <span id="smsPhone"></span></p><textarea id="smsMessage" readonly></textarea><div class="sms-buttons"><button id="copySmsBtn" class="btn-sm btn-blue">Copy</button><button id="sendDirectSmsBtn" class="btn-sm btn-sms-direct">Open SMS App</button><button id="closeSmsModal" class="btn-sm btn-red">Close</button></div></div></div>
                <a href="?admin=false" class="admin-link">Exit Admin</a>
            `;
            
            document.getElementById("addGuestBtn").onclick = async () => {
                let name = document.getElementById("newGuestName").value.trim();
                let type = document.getElementById("newCodeType").value;
                let phone = document.getElementById("newGuestPhone").value.trim();
                if (!name) return;
                let maxMap = { single: 1, couple: 2, family: 4, extended: 6 };
                let code = generateCode(name, type);
                showLoading(true, "Adding guest...");
                try {
                    await addDoc(collection(db, GUESTS_COLLECTION), { name, code, codeType: type, maxGuests: maxMap[type], phone, status: "pending", smsSent: false, replied: false, createdAt: new Date().toISOString() });
                    document.getElementById("newGuestName").value = ""; document.getElementById("newGuestPhone").value = "";
                    await loadAdminData();
                } finally {
                    showLoading(false);
                }
            };
            document.getElementById("refreshBtn").onclick = loadAdminData;
            document.getElementById("exportCsvBtn").onclick = () => {
                let csv = [["Code", "Guest Name", "Type", "Verified Name", "Address", "Guest Count", "Guest Names"]];
                for (let r of allResponses) {
                    csv.push([r.guestCode, r.guestName, r.codeType, r.fullName, r.fullAddress, r.guestCount, (r.guestNames || []).join("; ")]);
                }
                let content = csv.map(row => row.map(c => `"${String(c).replace(/"/g, '""')}"`).join(",")).join("\n");
                let blob = new Blob(["\uFEFF" + content], { type: "text/csv" });
                let url = URL.createObjectURL(blob);
                let a = document.createElement("a");
                a.href = url;
                a.download = `wedding_guests_${new Date().toISOString().slice(0,10)}.csv`;
                a.click();
                URL.revokeObjectURL(url);
            };
            document.getElementById("closeEditModal").onclick = () => document.getElementById("editModal").style.display = "none";
            document.getElementById("closeSmsModal").onclick = () => document.getElementById("smsModal").style.display = "none";
            document.getElementById("saveEditBtn").onclick = async () => {
                let newName = document.getElementById("editGuestName").value.trim();
                let newPhone = document.getElementById("editGuestPhone").value.trim();
                let newType = document.getElementById("editCodeType").value;
                let newMax = parseInt(document.getElementById("editMaxGuests").value);
                showLoading(true, "Saving changes...");
                try {
                    await updateDoc(doc(db, GUESTS_COLLECTION, currentEditGuestId), { name: newName, phone: newPhone, codeType: newType, maxGuests: newMax });
                    document.getElementById("editModal").style.display = "none";
                    await loadAdminData();
                } finally {
                    showLoading(false);
                }
            };
            document.getElementById("deleteGuestBtn").onclick = async () => {
                if (!confirm("Delete this guest?")) return;
                let guest = allGuests.find(g => g.id === currentEditGuestId);
                showLoading(true, "Deleting guest...");
                try {
                    if (guest) {
                        let resp = allResponses.find(r => r.guestCode === guest.code);
                        if (resp) await deleteDoc(doc(db, RESPONSES_COLLECTION, resp.id));
                    }
                    await deleteDoc(doc(db, GUESTS_COLLECTION, currentEditGuestId));
                    document.getElementById("editModal").style.display = "none";
                    await loadAdminData();
                } finally {
                    showLoading(false);
                }
            };
            document.getElementById("copySmsBtn").onclick = () => { navigator.clipboard.writeText(document.getElementById("smsMessage").value); alert("Copied!"); };
            document.getElementById("sendDirectSmsBtn").onclick = () => { let p = document.getElementById("smsPhone").innerText; let m = document.getElementById("smsMessage").value; window.location.href = "sms:" + p + "?body=" + encodeURIComponent(m); };
            document.getElementById("searchGuest").oninput = () => renderAdminTables();
            document.getElementById("filterStatus").onchange = () => renderAdminTables();
            let btns = document.querySelectorAll(".tab-btn");
            btns.forEach(b => b.onclick = function() { btns.forEach(btn => btn.classList.remove("active")); this.classList.add("active"); document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active")); document.getElementById(this.dataset.tab).classList.add("active"); });
            loadAdminData();
        }

        window.onclick = function(e) { if (e.target.classList && e.target.classList.contains("modal")) e.target.style.display = "none"; };

        (async function() {
            await seedGuests();
            let isAdmin = new URLSearchParams(window.location.search).get('admin') === 'true';
            if (isAdmin) {
                if (sessionStorage.getItem("adminLoggedIn") === "true") renderAdminDashboard();
                else renderAdminLogin();
            } else { renderGuestForm(); }
        })();
    </script>
</body>
</html>
